name: Grade ACR push

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name hyfregistry

      - name: Build and push image
        id: build
        run: |
          USERNAME="${{ github.event.pull_request.user.login }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          IMAGE="hyfregistry.azurecr.io/${USERNAME}-pipeline:${SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "✅ **Image pushed to ACR**",
                "",
                "`${{ steps.build.outputs.image }}`",
                "",
                "Browse the registry in the Azure Portal: https://portal.azure.com/#@hackyourfuture.nl/resource/subscriptions/1120c89d-2a5f-4a15-a582-2ea34f0bb5c3/resourceGroups/rg-hyf-data/providers/Microsoft.ContainerRegistry/registries/hyfregistry/repository",
                "",
                "Task 7 verification: your Dockerfile built and pushed cleanly from commit `${{ steps.build.outputs.short_sha }}`."
              ].join("\n")
            })

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "❌ **ACR push failed**",
                "",
                `Your Dockerfile did not build or push. See the run log: ${runUrl}`,
                "",
                "Common causes: Dockerfile syntax error, missing files in build context, or `requirements.txt` not installable."
              ].join("\n")
            })
