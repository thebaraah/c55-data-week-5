# Task 6: Build a CI workflow that runs on pull requests and pushes to main.
#
# See the assignment chapter for the required steps and commands.
# Fill in the TODO values below.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format . --check
      - name: Test
        run: API_KEY=test pytest -q
      - name: Build Docker image
        run: docker build -t barbari-pipeline:${{ github.sha }} .
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name hyfregistry

      - name: Tag image for ACR
        run: |
          docker tag barbari-pipeline:${{ github.sha }} hyfregistry.azurecr.io/barbari-pipeline:${{ github.sha }}

      - name: Push image to ACR
        run: |
          docker push hyfregistry.azurecr.io/barbari-pipeline:${{ github.sha }}