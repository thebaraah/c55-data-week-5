# Task 6: Build a CI workflow that runs on pull requests and pushes to main.
#
# See the assignment chapter for the required steps and commands.
# Fill in the TODO values below.
#
# NOTE on Task 7 (ACR push): you do NOT need to add `azure/login` or `docker
# push` steps to this file. GitHub blocks repository secrets from running on
# pull_request workflows that come from a fork, so an `azure/login` step here
# would fail. A central workflow named "Grade ACR push" on the assignment
# repo's main branch builds your Dockerfile and pushes it to ACR for you, and
# comments the image URL on your PR. Your Task 7 deliverable is the
# `assets/acr_push_week5.png` screenshot (taken from a local `docker push`).

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format . --check
      - name: Test
        run: API_KEY=test pytest -q
      - name: Build Docker image
        run: docker build -t barbari-pipeline:${{ github.sha }} .
      # The next four steps need the AZURE_CREDENTIALS secret, which GitHub
      # withholds on pull_request runs from forks for security. The `if:` guard
      # skips them on fork PRs so CI stays green; the central `Grade ACR push`
      # workflow on main handles the actual push from base-repo context.
      - name: Azure login
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        run: az acr login --name hyfregistry

      - name: Tag image for ACR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        run: |
          docker tag barbari-pipeline:${{ github.sha }} hyfregistry.azurecr.io/barbari-pipeline:${{ github.sha }}

      - name: Push image to ACR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        run: |
          docker push hyfregistry.azurecr.io/barbari-pipeline:${{ github.sha }}